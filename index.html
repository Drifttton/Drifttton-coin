        const counterDisplay = document.getElementById('counter');

        // ФУНКЦІЯ ОНОВЛЕННЯ КНОПКИ МАГАЗИНУ (активна чи ні)
        function checkShop() {

        tapButton.addEventListener('click', () => {
if (energy >= power) {

    updateEnergyUI(); 

    saveGameToCloud(); // Зберігаємо прогрес у хмару після кожного кліку

        checkShop();
        let energy = 100;


// Знаходимо наші нові елементи з HTML, щоб керувати ними
const energyValDisplay = document.getElementById('energyVal');
const energyBar = document.getElementById('energyBar');

function updateEnergyUI() {
    // Виводимо округлене число енергії на екран
    energyValDisplay.innerText = Math.floor(energy) + "/" + maxEnergy;
    
    // Міняємо ширину кольорової смужки через CSS стиль width
    energyBar.style.width = `${(energy / maxEnergy) * 100}%`;
}
setInterval(() => {
    if (energy < maxEnergy) {
        energy += regenSpeed; // тепер використовуємо змінну!
        
        if (energy > maxEnergy) {
            energy = maxEnergy; // Запобіжник, щоб не стало 105/100
        }
        
        updateEnergyUI(); // Оновлюємо смужку на екрані
    }
}, 1000); // 1000 мілісекунд = 1 секунда

upgradeEnergyButton.addEventListener('click', () => {
    if (count >= energyUpgradeCost) {
        count -= energyUpgradeCost; // Списуємо тапи
        maxEnergy += 50;            // Збільшуємо максимальну енергію на 50
        energy = maxEnergy;         // Відразу повністю заряджаємо батарею при купівлі!
        
        // Робимо наступний апгрейд дорожчим (наприклад, у 2 рази)
        energyUpgradeCost = Math.round(energyUpgradeCost * 2); 

        // Оновлюємо все на екрані
        counterDisplay.innerText = count;
        energyLvlDisplay.innerText = maxEnergy;
        upgradeEnergyButton.innerText = `Купити за ${energyUpgradeCost} тапів`;

        showPopup(`🔋 Батарея прокачана до ${maxEnergy}!`);
        updateUI(); // Перемальовуємо інтерфейс і смужку енергії
        saveGameToCloud(); // Зберігаємо прогрес у хмару після кожного апгрейду
    }
});
upgradeRegenButton.addEventListener('click', () => {
    if (count >= regenUpgradeCost) {
        count -= regenUpgradeCost; // Списуємо тапи
        regenSpeed += 1;          // Збільшуємо швидкість відновлення на +1 кожну секунду
        
        // Робимо наступний апгрейд дорожчим у 2.5 рази
        regenUpgradeCost = Math.round(regenUpgradeCost * 2.5); 

        // Оновлюємо текст на екрані
        counterDisplay.innerText = count;

    const password = passwordInput.value;

    auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
            currentUser = userCredential.user;
            saveGameToCloud();
            authContainer.style.display = 'none';
        })
        .catch((error) => { authError.innerText = "Помилка реєстрації: " + error.message; });
});

// 2. ВХІД
loginBtn.addEventListener('click', () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if (!email || !password) { authError.innerText = "Введіть пошту та пароль!"; return; }
    
    // Тут додано літери "In" — тепер метод правильний!
    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            currentUser = userCredential.user;
            loadGameFromCloud(); // Завантажуємо монети
        })
        .catch((error) => { 
            authError.innerText = "Помилка входу: " + error.message; 
        });
});

// 3. ВХІД ЧЕРЕЗ GOOGLE
googleLoginBtn.addEventListener('click', () => {
    const googleProvider = new firebase.auth.GoogleAuthProvider();
    
    // Перевірка на телефон
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    if (isMobile) {
        // Для мобілок — вхід в цьому ж вікні без поп-апів
        firebase.auth().signInWithRedirect(googleProvider);
    } else {
        // Для ПК — старий добрий поп-ап
        firebase.auth().signInWithPopup(googleProvider)
            .then((result) => {
                currentUser = result.user;
                console.log("Успішний вхід через Google (ПК):", currentUser.email);
                loadGameFromCloud();
            })
            .catch((error) => {
                authError.innerText = "Помилка входу: " + error.message;
            });
    }
});

// ФУНКЦІЯ ХМАРНОГО ЗБЕРЕЖЕННЯ
function saveGameToCloud() {
    if (!currentUser) return;

    db.collection("users").doc(currentUser.uid).set({
        count: count,
        power: power,
        level: level,
        upgradeCost: upgradeCost,
        energyUpgradeCost: energyUpgradeCost,
        maxEnergy: maxEnergy,
        regenSpeed: regenSpeed,
        regenUpgradeCost: regenUpgradeCost,
        email: currentUser.email,
        username: document.getElementById('usernameInput').value || ""
    })
    .then(() => { 
        console.log("Прогрес синхронізовано з хмарою!"); 
    })
    .catch((error) => { 
        console.error("Помилка збереження: ", error); 
    });
}

// ФУНКЦІЯ ЗАВАНТАЖЕННЯ З ХМАРИ
function loadGameFromCloud() {
    if (!currentUser) return;
    
    db.collection("users").doc(currentUser.uid).get().then((doc) => {
        if (doc.exists) {
            const data = doc.data();
            count = data.count || 0;
            power = data.power || 1;
            level = data.level || 1;
            upgradeCost = data.upgradeCost || 50;
            energyUpgradeCost = data.energyUpgradeCost || 100;
            maxEnergy = data.maxEnergy || 100;
            regenSpeed = data.regenSpeed || 3;
            regenUpgradeCost = data.regenUpgradeCost || 200;
            if (data.username) {
                      document.getElementById('usernameInput').value = data.username;
            }
            // Оновлюємо все на екрані
            counterDisplay.innerText = count;
            clickPowerDisplay.innerText = power;
            layerLvlDisplay.innerText = level;
            upgradeButton.innerText = `Купити за ${upgradeCost} тапів`;
            energyLvlDisplay.innerText = maxEnergy;
            upgradeEnergyButton.innerText = `Купити за ${energyUpgradeCost} тапів`;
            if (typeof regenLvlDisplay !== 'undefined' && regenLvlDisplay) {
                regenLvlDisplay.innerText = regenSpeed;
                upgradeRegenButton.innerText = `Купити за ${regenUpgradeCost} тапів`;
            }
            updateEnergyUI();
            checkShop();
        }
        authContainer.style.display = 'none'; // Ховаємо чорну заставку, впускаємо в гру
    });
    // Запускати збереження кожні 1 секунд (1000 мілісекунд)
    setInterval(saveGameToCloud, 1000);
}
const menuToggle = document.getElementById('menuToggle');
const sideMenu = document.getElementById('sideMenu');

// Відкрити/закрити меню при кліку на 3 рисочки
menuToggle.addEventListener('click', () => {
    sideMenu.classList.toggle('active');
});

// Закривати меню, якщо клікнули в будь-яке інше місце екрана (повз меню)
document.addEventListener('click', (event) => {
    if (!sideMenu.contains(event.target) && !menuToggle.contains(event.target)) {
        sideMenu.classList.remove('active');
    }
});
// Кнопка збереження нікнейму в меню
document.getElementById('saveProfileBtn').addEventListener('click', () => {
    const newUsername = document.getElementById('usernameInput').value.trim();
    
    if (!currentUser) {
        alert("Бро, ти спочатку залогінься!");
        return;
    }
    
    if (newUsername === "") {
        alert("Нік не може бути порожнім, ну ти чого?");
        return;
    }

    // Оновлюємо суто поле username в Firebase Firestore
    db.collection("users").doc(currentUser.uid).update({
        username: newUsername
    })
    .then(() => {
        // Замість бісячого попапу просто міняємо текст на кнопці на секунду
        const btn = document.getElementById('saveProfileBtn');
        btn.innerText = "Збережено! ✔";
        btn.style.backgroundColor = "#2e7d32";
        
        setTimeout(() => {
            btn.innerText = "Зберегти профіль";
            btn.style.backgroundColor = "#4caf50";
        }, 1500);
    })
    .catch((error) => {
        console.error("Помилка збереження ніку: ", error);
    });
});
